desc_install = "Плагин <b>complain</b> в первую очередь нужен для сайтов, занимающимся размещением какой-либо информации или ссылок.<br/>Он позволяет решать проблему &quot;мёртвых ссылок&quot; - теперь любой посетитель обнаружив проблему сможет одним нажатием сообщить автору новости о наличии той или иной проблемы с его новостью."
