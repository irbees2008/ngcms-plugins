desc = "The plugin allows file sharing with your users via the <b>BitTorrent</b> protocol and provides a basic set of <b>torrent</b> tracker-indexer functions.<br/><i><u>Note:</u> if a .torrent file and a magnet link are uploaded simultaneously, priority will be given to parameters from the .torrent file</i>"
desc_install = "The <b>tracker</b> plugin allows you to turn your site into a <font color=red>torrent</font> tracker.<br /><br />Attention! During installation the plugin modifies the system database!"
desc_deinstall = "Attention! When removing the plugin, all index information for the torrent tracker will be deleted. Upon reinstallation this information may be restored. Are you sure?"
main = "Main settings"
tracker = "Torrent <b>tracker</b> support - <font color=red><b>enabling this mode may significantly affect your site load!</b></font>"
tracker#desc = "Torrent <b>tracker</b> - the central module (server) in the distributed file sharing architecture. Its main task is to coordinate the exchange of the list of active users.<br/><b>Yes</b> - tracker support will be enabled<br/><b>No</b> - tracker support will be disabled<br/><br/><b>Your tracker URL: <font color=red>{tracker_url}</font></b> (it must be written in <b>.torrent</b> files)"
support.torrent = "<b>Torrent</b> file support"
support.torrent#desc = "A <b>.torrent</b> file is a unique description of a specific torrent distribution and contains all information about the files being distributed inside the torrent.<br/><b>Yes</b> - the plugin will scan files attached to news and if a file with the extension <i>.torrent</i> is attached, information about the distribution will be extracted from it.<br/><b>No</b> - the plugin will not check the list of files attached to news"
support.magnet = "<b>Magnet</b> link support"
support.magnet#desc = "<b>Magnet</b> links allow you to completely eliminate the need to store .torrent files on servers, all information (including the torrent file) resides with the client. This eliminates the need for trackers as the exchange is done via <b>DHT</b>. The only drawback of this method is the inability to track activity statistics per distribution.<br/><b>Yes</b> - magnet links can be used to identify a torrent<br/><b>No</b> - magnet link support will be disabled"
