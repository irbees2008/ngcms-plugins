localsource = "Select the directory from which the plugin will load display templates"
localsource#desc = "<b>Site template</b> – the plugin will try to load templates from the global site template directory; if unavailable, templates will be taken from the plugin's own directory<br /><b>Plugin</b> – templates will always be taken from the plugin's own directory"
lsrc.site = "Site template"
lsrc.plugin = "Plugin"
desc_install = "The <b>jchat</b> plugin lets you install an AJAX-based chat on your site<br /><br />Note! Installation modifies the site database!"
desc_deinstall = "Warning! Removing the plugin permanently deletes all chat messages. Are you sure?"
desc = "The plugin provides an AJAX-style chat on the site.<br/>Warning! With a large number of visitors this chat may create significant server load!"
conf.main = "General settings"
conf.panel = "Sidebar panel"
conf.window = "Dedicated page"
access = "Guest access"
access#desc = "Set the access level for guests:<br/><b>Disabled</b> – guests will not see the chat box<br/><b>Read-only</b> – guests can view the chat box<br/><b>Read + Write</b> – guests can also post messages"
access.off = "Disabled"
access.ro = "Read-only"
access.rw = "Read + Write"
refresh = "Page refresh interval for users"
refresh#desc = "Set the interval (in seconds) between chat-box updates for visitors.<br/>Recommended value: <b>30</b> seconds (default: <b>120</b> seconds)<br/>Allowed range: <b>5</b> to <b>1800</b><br/><font color='red'>Warning! Lower values mean higher server load!</font>"
history = "Number of messages to show in chat history"
history#desc = "This number (approximately) will be shown to visitors. Older messages are deleted when the limit is exceeded.<br/>Default: <b>30</b><br/>Allowed range: <b>1</b> to <b>500</b>"
rate_limit = "Minimum interval between messages (seconds)"
rate_limit#desc = "This limit applies per <b>IP address</b> and is intended to prevent flooding.<br/>Default: <b>0</b> (flood protection disabled)"
maxidle = "Maximum chat refresh time (seconds) during user inactivity"
maxidle#desc = "Users sometimes leave a chat page open and forget about it — this wastes server resources.<br/>To avoid this you can set a maximum time (in seconds) during which the chat will continue refreshing.<br/>Default: <b>0</b> (chat refreshes indefinitely)"
maxwlen = "Maximum word length in a message"
maxwlen#desc = "Words longer than this value will be broken by a space to prevent horizontal scrolling.<br/>Default: <b>40</b>"
maxlen = "Maximum message length"
maxlen#desc = "Users will not be able to send a message longer than this value.<br/>Default: <b>500</b> characters"
order = "Message display order"
order#desc = "Defines the order of messages in the chat:<br/><b>Newest at bottom</b> – new messages appear at the bottom<br/><b>Newest at top</b> – new messages appear at the top"
order.asc = "Newest at bottom"
order.desc = "Newest at top"
enable.panel = "Enable sidebar panel"
enable.panel#desc = "<b>Yes</b> – sidebar panel is enabled<br/><b>No</b> – sidebar panel is disabled<br/><i>Uses template <font color=red>jchat.tpl</font></i>"
enable.win = "Enable dedicated page"
enable.win#desc = "<b>Yes</b> – dedicated page is enabled<br/><b>No</b> – dedicated page is disabled"
win.mode = "Display mode on the dedicated chat page"
win.mode#desc = "<b>Internal</b> – chat window is shown in the main content block inside the site design (<i>template <font color=red>jchat.main.tpl</font></i>)<br/><b>External</b> – chat window is shown in a separate window with its own design (<i>template <font color=red>jchat.self.tpl</font></i>)"
win.mode.internal = "Internal"
win.mode.external = "External"
conf.stat = "Statistics / management"
format_time = "Time display format in chat"
format_time#desc = "Uses the <b>strftime()</b> function format<br/>Default: <b>%H:%M</b>"
format_date = "Date display format in chat"
format_date#desc = "Uses the <b>strftime()</b> function format<br/>Default: <b>%d.%m.%Y %H:%M</b>"

