instruction.title = "Инструкция:"

vk.step1 = "Создайте приложение VK ID (id.vk.com) и получите App ID и Secret."
vk.step2.prefix = "Укажите Redirect URI:"
vk.step2.suffix = "(без query-параметров)."
vk.step3.prefix = "Рекомендуемый scope:"

yandex.step1 = "Создайте приложение в <a href=\"https://oauth.yandex.ru/client/new\" target=\"_blank\" rel=\"noopener\">Яндекс OAuth</a>."
yandex.step2.prefix = "Redirect URI:"
yandex.step3 = "Включите доступ к email (если требуется) и сохраните Client ID/Secret."

google.step1 = "В <a href=\"https://console.cloud.google.com/apis/credentials\" target=\"_blank\" rel=\"noopener\">Google Cloud Console</a> создайте OAuth 2.0 Client ID."
google.step2.prefix = "Authorized redirect URIs:"
google.step3 = "Сохраните Client ID и Client Secret и вставьте ниже."

facebook.step1 = "Создайте приложение на <a href=\"https://developers.facebook.com/apps\" target=\"_blank\" rel=\"noopener\">Facebook Developers</a>."
facebook.step2.prefix = "Valid OAuth Redirect URIs:"
facebook.step3 = "Скопируйте App ID (Client ID) и App Secret (Client Secret) сюда."

github.step1 = "Откройте <a href=\"https://github.com/settings/developers\" target=\"_blank\" rel=\"noopener\">GitHub Developer settings</a> -> New OAuth App."
github.step2.prefix = "Authorization callback URL:"
github.step3 = "Scopes: <code>read:user</code>, <code>user:email</code> (для получения e-mail)."
github.step4 = "Скопируйте Client ID/Secret в поля ниже."

