install_text = "The plugin notifies external systems (usually search engines) about updates on your site.<br/><font color='red'>You must activate the <u>rss_export</u> plugin before using this plugin!</font></b><br/><br/>"
desc = "The plugin notifies any third-party services that support the XML-RPC command <b>weblogUpdates.ping</b> about updates on your site.<br/><b><font color='red'>You must activate the <u>rss_export</u> plugin before using this plugin!</font></b>"
proxy = "Use proxy pinger"
proxy#desc = "In normal mode the plugin will ping the specified services itself.<br/>But each service ping usually takes 1-3 seconds. If you specify more than 10 services, adding news will be extremely slow and errors will occur periodically.<br/><b>Yes</b> - use proxy, this allows pinging multiple services without affecting site performance<br/><b>No</b> - do ping requests directly"
urls = "List of URLs to send <b>ping</b> to"
urls#desc = "Each line must contain one URL address"
